services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cartorio
      POSTGRES_USER: cartorio_user
      POSTGRES_PASSWORD: cartorio_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      APP_BASE_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:3001
      DATABASE_URL: postgres://cartorio_user:cartorio_dev@db:5432/cartorio
      DB_SSL: "false"
      JWT_SECRET: troque-esta-chave-local
      JWT_EXPIRES_IN: 8h
    ports:
      - "3001:3001"

volumes:
  postgres_data:
